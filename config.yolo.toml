[runtime]
log_level = "DEBUG"
environment = "development"
agent_timeout_seconds = 420

[channels.telegram]
enabled = true
bot_token = ""
allowed_chat_ids = []
allowed_user_ids = []
require_authorized = true
mode = "long_polling"
webhook_url = ""
media_enabled = true
max_photo_bytes = "5MB"
max_document_bytes = "10MB"
max_total_media_bytes = "12MB"
max_attachments_per_message = 3
allowed_document_mime_types = []

[llm]
provider = "openai_responses"
base_url = ""
model = "gpt-5-mini"
# reasoning_effort = "medium"
http2 = true
max_tool_iterations = 60
max_new_tokens = 50000
request_timeout_seconds = 180
sock_connect_timeout_seconds = 10
sock_read_timeout_seconds = 180
retry_attempts = 3
retry_delay_seconds = 2.0
main_responses_state_mode = "full_messages"
agent_responses_state_mode = "previous_response_id"
prompt_cache_enabled = true
system_prompt = "You are Minibot, a helpful assistant."
system_prompt_file = "./prompts/main_agent_system.md"
prompts_dir = "./prompts"

[llm.openrouter]
# reasoning_enabled = true

[llm.openrouter.provider]
# only = ["deepinfra", "novita"]

[providers.openai]
api_key = ""
base_url = ""

[providers.openai_responses]
api_key = ""
base_url = ""

[providers.openrouter]
api_key = ""
base_url = ""

[providers.claude]
api_key = ""
base_url = ""

[providers.google]
api_key = ""
base_url = ""

[orchestration]
directory = "./agents"
default_timeout_seconds = 360
tool_ownership_mode = "exclusive_mcp"
delegated_tool_call_policy = "auto"
main_tool_use_guardrail = "disabled"

[orchestration.main_agent]
name = "minibot"
tools_deny = ["mcp*"]


[memory]
backend = "sqlite"
sqlite_url = "sqlite+aiosqlite:///./data/minibot.db"
max_history_messages = 200
max_history_tokens = 140000
notify_compaction_updates = false

[scheduler.prompts]
enabled = true
sqlite_url = "sqlite+aiosqlite:///./data/scheduled_prompts.db"
poll_interval_seconds = 60
lease_timeout_seconds = 120
batch_size = 10
max_attempts = 3
min_recurrence_interval_seconds = 60
pool_size = 5
echo = false

[tools.kv_memory]
enabled = true
sqlite_url = "sqlite+aiosqlite:///./data/kv_memory.db"
pool_size = 5
echo = false
default_limit = 20
max_limit = 100
default_owner_id = "primary"

[tools.http_client]
enabled = true
timeout_seconds = 30
max_bytes = "16KB"
response_processing_mode = "auto"
max_chars = 6000
normalize_whitespace = true
spill_to_managed_file = true
spill_after_chars = 16000
spill_preview_chars = 2000
max_spill_bytes = "5MB"
spill_subdir = "http_responses/tmp"

[tools.file_storage]
enabled = true
root_dir = "./data/files"
max_write_bytes = "64KB"
allow_outside_root = true
save_incoming_uploads = true
uploads_subdir = "uploads"
incoming_temp_subdir = "uploads/temp"

[tools.grep]
enabled = true
max_matches = 200
max_file_size_bytes = "1MB"

[tools.audio_transcription]
enabled = true
model = "small"
device = "cpu"
compute_type = "int8"
beam_size = 5
vad_filter = true
auto_transcribe_short_incoming = true
auto_transcribe_max_duration_seconds = 45

[tools.browser]
output_dir = "./data/files/browser"

[tools.calculator]
enabled = true
default_scale = 28
max_expression_length = 200
max_exponent_abs = 1000

[tools.python_exec]
enabled = true
backend = "host"
python_path = ""
venv_path = ""
sandbox_mode = "none"
default_timeout_seconds = 8
max_timeout_seconds = 20
max_output_bytes = "64KB"
max_code_bytes = "32KB"
artifacts_enabled = true
artifacts_default_subdir = "generated"
artifacts_allowed_extensions = [".png", ".jpg", ".jpeg", ".pdf", ".csv", ".txt", ".json", ".svg"]
artifacts_max_files = 5
artifacts_max_file_bytes = "5MB"
artifacts_max_total_bytes = "20MB"
artifacts_allow_in_jail = false
artifacts_jail_shared_dir = ""
pass_parent_env = false
env_allowlist = ["PATH", "LANG", "LC_ALL", "PYTHONUTF8"]

[tools.bash]
enabled = true
default_timeout_seconds = 15
max_timeout_seconds = 120
max_output_bytes = "128KB"
pass_parent_env = true
env_allowlist = ["PATH", "HOME", "USER", "LANG", "LC_ALL", "SHELL"]

[tools.apply_patch]
enabled = true
restrict_to_workspace = true
workspace_root = "."
allow_outside_workspace = false
preserve_trailing_newline = true
max_patch_bytes = "256KB"

[logging]
structured = true
logfmt_enabled = true
log_level = "DEBUG"
kv_separator = "="
record_separator = " "

[tools.mcp]
enabled = true
name_prefix = "mcp"
timeout_seconds = 30

[[tools.mcp.servers]]
name = "playwright-cli"
transport = "stdio"
command = "npx"
args = [
  "@playwright/mcp@latest",
  "--headless",
  "--browser=chromium",
  "--caps=vision,pdf,network",
  "--block-service-workers",
  "--image-responses=omit",
  "--snapshot-mode=incremental",
  "--timeout-action=2000",
]
env = {}
cwd = "."
enabled_tools = []
disabled_tools = []

# Agent Skills support (agentskills.io spec).
# Setting `paths` to a non-empty list REPLACES the defaults entirely.
# Use this when you want to load only your own skills and avoid picking up
# development skills bundled with the MiniBot project directory.
[tools.skills]
enabled = true
# Recommended: create a ./skills directory and set paths to load only your own skills.
# paths = ["./skills"]
