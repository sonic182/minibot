services:
  minibot-rabbitmq:
    image: rabbitmq:4.2-management
    container_name: minibot-rabbit
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  minibot:
    build: .
    container_name: minibot
    restart: unless-stopped
    init: true
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./logs:/app/logs
      - ./data:/app/data
      - ./minibot:/app/minibot
      - ./skills:/app/skills
    command: ["minibot"]
