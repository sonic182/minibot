services:
  minibot-rabbitmq:
    image: rabbitmq:4.2-management
    container_name: minibot-rabbit
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minibot:
    build: .
    container_name: minibot
    restart: unless-stopped
    depends_on:
      minibot-rabbitmq:
        condition: service_healthy
    init: true
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./logs:/app/logs
      - ./data:/app/data
      - ./minibot:/app/minibot
      - ./skills:/app/skills
    command: ["minibot"]
